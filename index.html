<!DOCTYPE html>
<html lang="pt-BR" data-theme="dark">
<head>

  <meta name="viewport" content="width=device-width, initial-scale=1.0" />

  <link rel="preconnect" href="https://fonts.googleapis.com" />

<body>
<script>

  if (sessionStorage.getItem('ff_auth') !== '1') {
