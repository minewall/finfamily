<!DOCTYPE html>
<html lang="pt-BR" data-theme="light">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Admin — Usuários · Haile</title>
  <link rel="stylesheet" href="../app/css/main.css">
  <link rel="stylesheet" href="admin.css">
</head>
<body>

<aside id="admin-sidebar"></aside>

<div id="admin-main">
  <header id="admin-topbar">
    <div>
      <div class="admin-page-title">Usuários</div>
      <div class="admin-page-sub">Gestão de contas, tiers e roles</div>
    </div>
    <div class="admin-topbar-actions">
      <input class="form-input" id="searchInput" placeholder="Filtrar por nome ou e-mail…" style="width:240px">
      <button class="btn btn-secondary" id="btnRefresh" style="display:flex;align-items:center;gap:6px;font-size:12px">
        <svg data-lucide="refresh-cw" width="13" height="13" stroke="currentColor" viewBox="0 0 24 24" fill="none" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><use href="#lucide-refresh-cw"/></svg>
        Atualizar
      </button>
      <button class="btn btn-primary" id="btnInvite" style="display:flex;align-items:center;gap:6px;font-size:12px">
        <svg width="13" height="13" stroke="currentColor" viewBox="0 0 24 24" fill="none" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M16 21v-2a4 4 0 0 0-4-4H5a4 4 0 0 0-4 4v2"/><circle cx="8.5" cy="7" r="4"/><line x1="20" y1="8" x2="20" y2="14"/><line x1="23" y1="11" x2="17" y2="11"/></svg>
        Convidar usuário
      </button>
    </div>
  </header>

  <main id="admin-content">
    <div class="admin-table-card">
      <div class="admin-table-header">
        <span class="admin-table-header-title">Todos os usuários</span>
        <span id="userCount" style="font-size:12px;color:var(--text-3);margin-left:auto"></span>
      </div>
      <div class="admin-table-wrap">
        <div id="usersWrap" class="admin-loading">Carregando…</div>
      </div>
    </div>
  </main>
</div>

<div id="admin-toast"></div>

<!-- ─── Modal: Convidar usuário ──────────────────────────────────────── -->
<div id="inviteModal" class="invite-modal-overlay" style="display:none">
  <div class="invite-modal-card">
    <div class="invite-modal-header">
      <h3 style="margin:0;font-size:16px;font-weight:600">Convidar usuário</h3>
      <button class="btn-icon" id="inviteClose" aria-label="Fechar">
        <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><line x1="18" y1="6" x2="6" y2="18"/><line x1="6" y1="6" x2="18" y2="18"/></svg>
      </button>
    </div>
    <div class="invite-modal-body">
      <p style="font-size:12.5px;color:var(--text-3);margin:0 0 14px;line-height:1.5">
        O usuário receberá um e-mail com link de cadastro. O tier abaixo é aplicado assim que ele aceitar o convite.
      </p>
      <label class="form-label" for="inviteEmail">E-mail</label>
      <input class="form-input" id="inviteEmail" type="email" placeholder="usuario@exemplo.com" autocomplete="off">
      <label class="form-label" for="inviteTier" style="margin-top:12px">Tier inicial</label>
      <select class="form-input" id="inviteTier">
        <option value="free">Free</option>
        <option value="always_free">Always free (parceiro)</option>
        <option value="plus">Plus</option>
        <option value="premium">Premium</option>
      </select>
      <div id="inviteError" class="invite-modal-error" style="display:none"></div>
    </div>
    <div class="invite-modal-footer">
      <button class="btn btn-secondary" id="inviteCancel" type="button">Cancelar</button>
      <button class="btn btn-primary" id="inviteSubmit" type="button">Enviar convite</button>
    </div>
  </div>
</div>

<style>
.invite-modal-overlay {
  position: fixed; inset: 0;
  background: rgba(0,0,0,0.5);
  display: flex; align-items: center; justify-content: center;
  z-index: 1000;
}
.invite-modal-card {
  background: var(--bg-1, #fff);
  border-radius: 12px;
  width: min(420px, calc(100% - 32px));
  box-shadow: 0 12px 48px rgba(0,0,0,0.2);
  overflow: hidden;
}
.invite-modal-header,
.invite-modal-footer {
  display: flex; align-items: center; justify-content: space-between;
  padding: 14px 18px;
  border-bottom: 1px solid var(--border, #e5e7eb);
}
.invite-modal-footer {
  border-bottom: 0;
  border-top: 1px solid var(--border, #e5e7eb);
  gap: 8px; justify-content: flex-end;
}
.invite-modal-body { padding: 16px 18px; }
.invite-modal-body .form-label {
  display: block; font-size: 11.5px; font-weight: 500;
  color: var(--text-3); margin-bottom: 6px;
}
.invite-modal-error {
  margin-top: 12px; padding: 8px 10px;
  font-size: 12px; color: #b91c1c;
  background: #fef2f2; border: 1px solid #fecaca; border-radius: 6px;
}
.btn-icon {
  background: transparent; border: 0; color: var(--text-3);
  cursor: pointer; padding: 4px; border-radius: 4px;
}
.btn-icon:hover { background: var(--bg-2, #f3f4f6); }
</style>

<script src="https://unpkg.com/lucide@latest/dist/umd/lucide.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/dist/umd/supabase.min.js"></script>
<script src="../app/js/supabase-client.js"></script>
<script src="admin.js"></script>
<script>
let _allUsers = [];

document.addEventListener('DOMContentLoaded', async () => {
  Admin.renderSidebar('users');
  const ok = await Admin.boot('users');
  if (!ok) return;

  document.getElementById('btnRefresh').addEventListener('click', load);
  document.getElementById('searchInput').addEventListener('input', applyFilter);
  document.getElementById('usersWrap').addEventListener('click', handleAction);

  // Invite modal wiring
  const inviteModal  = document.getElementById('inviteModal');
  const inviteEmail  = document.getElementById('inviteEmail');
  const inviteTier   = document.getElementById('inviteTier');
  const inviteError  = document.getElementById('inviteError');
  const inviteSubmit = document.getElementById('inviteSubmit');
  const openInvite = () => {
    inviteEmail.value = '';
    inviteTier.value = 'free';
    inviteError.style.display = 'none';
    inviteError.textContent = '';
    inviteSubmit.disabled = false;
    inviteSubmit.textContent = 'Enviar convite';
    inviteModal.style.display = 'flex';
    setTimeout(() => inviteEmail.focus(), 50);
  };
  const closeInvite = () => { inviteModal.style.display = 'none'; };
  document.getElementById('btnInvite').addEventListener('click', openInvite);
  document.getElementById('inviteClose').addEventListener('click', closeInvite);
  document.getElementById('inviteCancel').addEventListener('click', closeInvite);
  inviteModal.addEventListener('click', e => { if (e.target === inviteModal) closeInvite(); });
  inviteSubmit.addEventListener('click', submitInvite);
  inviteEmail.addEventListener('keydown', e => { if (e.key === 'Enter') submitInvite(); });

  async function submitInvite() {
    const email = inviteEmail.value.trim();
    const tier  = inviteTier.value;
    inviteError.style.display = 'none';
    if (!email || !email.includes('@')) {
      inviteError.textContent = 'Informe um e-mail válido.';
      inviteError.style.display = 'block';
      return;
    }
    inviteSubmit.disabled = true;
    inviteSubmit.textContent = 'Enviando…';
    try {
      await SupabaseSync.adminCall('inviteUser', { email, tier });
      closeInvite();
      Admin.toast(`Convite enviado para ${email} (tier: ${tier})`, 'success');
      load();
    } catch (err) {
      inviteError.textContent = err.message || 'Falha ao enviar convite.';
      inviteError.style.display = 'block';
      inviteSubmit.disabled = false;
      inviteSubmit.textContent = 'Enviar convite';
    }
  }

  load();
});

async function load() {
  document.getElementById('usersWrap').innerHTML = '<div class="admin-loading">Carregando…</div>';
  try {
    const res = await SupabaseSync.adminCall('listUsers', { limit: 500 });
    _allUsers = res.users || [];
    applyFilter();
  } catch (e) {
    document.getElementById('usersWrap').innerHTML = `<div class="admin-error">${e.message}</div>`;
  }
}

function applyFilter() {
  const q = document.getElementById('searchInput').value.toLowerCase();
  const filtered = q
    ? _allUsers.filter(u => (u.email || '').toLowerCase().includes(q) || (u.full_name || '').toLowerCase().includes(q))
    : _allUsers;
  document.getElementById('userCount').textContent = `${filtered.length} usuário${filtered.length !== 1 ? 's' : ''}`;
  drawTable(filtered);
}

function drawTable(users) {
  if (!users.length) {
    document.getElementById('usersWrap').innerHTML = '<div class="admin-empty">Nenhum usuário encontrado.</div>';
    return;
  }
  document.getElementById('usersWrap').innerHTML = `
    <table class="admin-table" style="min-width:820px">
      <thead><tr>
        <th>Nome / E-mail</th>
        <th>Role</th>
        <th>Tier</th>
        <th>Criado em</th>
        <th style="text-align:right">Ações</th>
      </tr></thead>
      <tbody>${users.map(u => `<tr>
        <td>
          <div style="font-weight:500;color:var(--text-1)">${u.full_name || '—'}</div>
          <div style="font-size:11px;color:var(--text-3)">${u.email || u.id}</div>
        </td>
        <td><span class="badge badge-${u.role || 'user'}">${u.role || 'user'}</span></td>
        <td><span class="badge badge-${u.tier || 'free'}">${u.tier || 'free'}</span></td>
        <td style="color:var(--text-3);font-size:12px">${u.created_at ? new Date(u.created_at).toLocaleDateString('pt-BR') : '—'}</td>
        <td style="text-align:right;white-space:nowrap;display:flex;gap:4px;justify-content:flex-end">
          <button class="btn-xs" data-action="tier" data-id="${u.id}" data-cur="${u.tier || 'free'}">Tier</button>
          <button class="btn-xs" data-action="role" data-id="${u.id}" data-cur="${u.role || 'user'}">Role</button>
          <button class="btn-xs ${u.tier === 'suspended' ? 'success' : 'warning'}" data-action="${u.tier === 'suspended' ? 'reactivate' : 'suspend'}" data-id="${u.id}" data-email="${u.email || u.id}">${u.tier === 'suspended' ? 'Reativar' : 'Suspender'}</button>
          <button class="btn-xs" data-action="export" data-id="${u.id}">Export</button>
          <button class="btn-xs danger" data-action="delete" data-id="${u.id}" data-email="${u.email || u.id}">Deletar</button>
        </td>
      </tr>`).join('')}</tbody>
    </table>`;
}

async function handleAction(e) {
  const btn = e.target.closest('[data-action]');
  if (!btn) return;
  const { action, id, cur, email } = btn.dataset;

  if (action === 'tier') {
    // Cycle não inclui 'suspended' — usar botão dedicado pra isso
    const tiers = ['free', 'always_free', 'plus', 'premium'];
    const idx = tiers.indexOf(cur);
    const next = idx === -1 ? 'free' : tiers[(idx + 1) % tiers.length];
    if (!confirm(`Mudar tier de "${cur}" → "${next}"?`)) return;
    try {
      await SupabaseSync.adminCall('setTier', { userId: id, tier: next });
      Admin.toast(`Tier atualizado para ${next}`, 'success');
      load();
    } catch (err) { Admin.toast(err.message, 'error'); }
  }

  if (action === 'suspend') {
    if (!confirm(`Suspender "${email}"? O user não conseguirá usar o Coach até ser reativado.`)) return;
    try {
      await SupabaseSync.adminCall('suspendUser', { userId: id });
      Admin.toast('Usuário suspenso', 'success');
      load();
    } catch (err) { Admin.toast(err.message, 'error'); }
  }

  if (action === 'reactivate') {
    if (!confirm(`Reativar "${email}"? Restaura o tier anterior à suspensão.`)) return;
    try {
      const res = await SupabaseSync.adminCall('reactivateUser', { userId: id });
      Admin.toast(`Usuário reativado (tier: ${res?.restored_to || 'free'})`, 'success');
      load();
    } catch (err) { Admin.toast(err.message, 'error'); }
  }

  if (action === 'role') {
    const next = cur === 'admin' ? 'user' : 'admin';
    if (!confirm(`Mudar role de "${cur}" → "${next}"?`)) return;
    try {
      await SupabaseSync.adminCall('setRole', { userId: id, role: next });
      Admin.toast(`Role atualizado para ${next}`, 'success');
      load();
    } catch (err) { Admin.toast(err.message, 'error'); }
  }

  if (action === 'export') {
    try {
      const data = await SupabaseSync.adminCall('exportUser', { userId: id });
      const blob = new Blob([JSON.stringify(data, null, 2)], { type: 'application/json' });
      const url = URL.createObjectURL(blob);
      const a = Object.assign(document.createElement('a'), { href: url, download: `haile-export-${id.slice(0,8)}.json` });
      a.click();
      URL.revokeObjectURL(url);
      Admin.toast('Export baixado', 'success');
    } catch (err) { Admin.toast(err.message, 'error'); }
  }

  if (action === 'delete') {
    if (!confirm(`ATENÇÃO: deletar a conta de "${email}" e todos os dados?\n\nIrreversível.`)) return;
    try {
      await SupabaseSync.adminCall('deleteUser', { userId: id });
      Admin.toast('Conta deletada', 'success');
      load();
    } catch (err) { Admin.toast(err.message, 'error'); }
  }
}
</script>
</body>
</html>
