<!DOCTYPE html>
<html lang="pt-BR" data-theme="dark">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>FinFamily — Acesso</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&family=JetBrains+Mono:wght@400;500;600&display=swap" rel="stylesheet" />
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg:           #0d0f14;
      --bg-card:      #13161e;
      --bg-elevated:  #1a1d27;
      --border:       #1f2330;
      --text-1:       #f1f3f9;
      --text-2:       #a0a8c0;
      --text-3:       #6b7494;
      --accent:       #7C6EF8;
      --accent-dim:   #7c6ef815;
      --green:        #22C55E;
      --red:          #EF4444;
    }

    body {
      font-family: 'Inter', sans-serif;
      background: var(--bg);
      color: var(--text-1);
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 24px;
    }

    .login-wrap { width: 100%; max-width: 380px; }

    .brand {
      display: flex; align-items: center; gap: 12px;
      justify-content: center; margin-bottom: 40px;
    }
    .brand-icon {
      width: 44px; height: 44px; border-radius: 12px;
      background: var(--accent-dim); border: 1px solid #7c6ef840;
      display: flex; align-items: center; justify-content: center;
      color: var(--accent);
    }
    .brand-name { font-size: 24px; font-weight: 800; letter-spacing: -0.5px; }
    .brand-sub  { font-size: 12px; color: var(--text-3); font-family: 'JetBrains Mono', monospace; margin-top: -2px; }

    .card { background: var(--bg-card); border: 1px solid var(--border); border-radius: 16px; padding: 32px; }
    .card-title { font-size: 18px; font-weight: 700; margin-bottom: 6px; }
    .card-sub   { font-size: 13px; color: var(--text-3); margin-bottom: 28px; }

    .form-group  { margin-bottom: 16px; }
    .form-label  {
      display: block; font-size: 12px; font-weight: 600; color: var(--text-2);
      text-transform: uppercase; letter-spacing: .06em; margin-bottom: 6px;
    }
    .form-input  {
      width: 100%; background: var(--bg-elevated); border: 1px solid var(--border);
      border-radius: 8px; color: var(--text-1); font-size: 14px;
      font-family: 'Inter', sans-serif; padding: 10px 14px; outline: none;
      transition: border-color .15s;
    }
    .form-input:focus { border-color: var(--accent); }
    .form-input::placeholder { color: var(--text-3); }

    .btn-login {
      width: 100%; margin-top: 8px; background: var(--accent); color: #fff;
      border: none; border-radius: 8px; font-size: 14px; font-weight: 600;
      font-family: 'Inter', sans-serif; padding: 12px; cursor: pointer;
      transition: opacity .15s, transform .1s; display: flex;
      align-items: center; justify-content: center; gap: 8px;
    }
    .btn-login:hover  { opacity: .9; }
    .btn-login:active { transform: scale(.98); }
    .btn-login:disabled { opacity: .6; cursor: not-allowed; }

    .spinner {
      width: 16px; height: 16px; border: 2px solid #ffffff40;
      border-top-color: #fff; border-radius: 50%;
      animation: spin .7s linear infinite; display: none;
    }
    .btn-login.loading .spinner { display: block; }
    @keyframes spin { to { transform: rotate(360deg); } }

    .msg {
      border-radius: 8px; font-size: 13px; padding: 10px 14px;
      margin-top: 12px; text-align: center; display: none;
    }
    .msg.visible { display: block; }
    .msg.error   { background: #ef444418; border: 1px solid #ef444440; color: var(--red); }
    .msg.success { background: #22c55e18; border: 1px solid #22c55e40; color: var(--green); }

    .divider {
      display: flex; align-items: center; gap: 12px;
      margin: 20px 0; color: var(--text-3); font-size: 12px;
    }
    .divider::before, .divider::after {
      content: ''; flex: 1; height: 1px; background: var(--border);
    }

    .btn-secondary {
      width: 100%; background: transparent; color: var(--text-2);
      border: 1px solid var(--border); border-radius: 8px; font-size: 13px;
      font-weight: 500; font-family: 'Inter', sans-serif; padding: 10px;
      cursor: pointer; transition: border-color .15s, color .15s;
    }
    .btn-secondary:hover { border-color: var(--accent); color: var(--accent); }

    .footer-note { text-align: center; font-size: 11px; color: var(--text-3); margin-top: 24px; }

    .sync-badge {
      display: flex; align-items: center; gap: 6px; justify-content: center;
      font-size: 11px; color: var(--text-3); margin-top: 16px;
    }
    .sync-dot { width: 6px; height: 6px; border-radius: 50%; background: var(--green); }
  </style>
</head>
<body>

<div class="login-wrap">

  <div class="brand">
    <div class="brand-icon">
      <svg width="22" height="22" viewBox="0 0 24 24" fill="none">
        <path d="M12 2L2 7l10 5 10-5-10-5z" stroke="currentColor" stroke-width="2" stroke-linejoin="round"/>
        <path d="M2 17l10 5 10-5" stroke="currentColor" stroke-width="2" stroke-linejoin="round"/>
        <path d="M2 12l10 5 10-5" stroke="currentColor" stroke-width="2" stroke-linejoin="round"/>
      </svg>
    </div>
    <div>
      <div class="brand-name">FinFamily</div>
      <div class="brand-sub">Gestão Financeira · 2026</div>
    </div>
  </div>

  <div class="card">
    <div class="card-title" id="cardTitle">Bem-vindo de volta</div>
    <div class="card-sub"  id="cardSub">Entre com seu e-mail e senha para continuar</div>

    <form id="loginForm" autocomplete="off">
      <div class="form-group">
        <label class="form-label" for="fEmail">E-mail</label>
        <input class="form-input" id="fEmail" type="email" placeholder="seu@email.com" autocomplete="email" />
      </div>
      <div class="form-group">
        <label class="form-label" for="fPass">Senha</label>
        <input class="form-input" id="fPass" type="password" placeholder="••••••••" autocomplete="current-password" />
      </div>
      <div class="form-group" id="fPassConfirmGroup" style="display:none">
        <label class="form-label" for="fPassConfirm">Confirmar Senha</label>
        <input class="form-input" id="fPassConfirm" type="password" placeholder="••••••••" autocomplete="new-password" />
      </div>

      <button class="btn-login" type="submit" id="btnSubmit">
        <div class="spinner"></div>
        <span id="btnLabel">Entrar</span>
      </button>

      <div class="msg error" id="errorMsg"></div>
      <div class="msg success" id="successMsg"></div>
    </form>

    <div class="divider" id="divider">ou</div>

    <button class="btn-secondary" id="btnToggleMode">Primeiro acesso? Criar conta</button>
  </div>

  <div class="sync-badge">
    <div class="sync-dot"></div>
    Dados sincronizados na nuvem via Supabase
  </div>

  <div class="footer-note">FinFamily © 2026 · Acesso privado</div>

</div>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/dist/umd/supabase.js"></script>
<script>
  const SUPABASE_URL = 'https://lpudgulhnfuwdttetwdn.supabase.co';
  const SUPABASE_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImxwdWRndWxobmZ1d2R0dGV0d2RuIiwicm9sZSI6ImFub24iLCJpYXQiOjE3Nzg4Nzg3MDUsImV4cCI6MjA5NDQ1NDcwNX0.cT0l012GjSeWV3mgA_-RIq4MEtrLvTUeGwd_cEuhH84';
  const sb = supabase.createClient(SUPABASE_URL, SUPABASE_KEY);

  // Se já tem sessão ativa no Supabase, redireciona direto
  sb.auth.getSession().then(({ data }) => {
    if (data?.session) {
      sessionStorage.setItem('ff_auth', '1');
      window.location.replace('index.html');
    }
  });

  let isSignUp = false;

  const btnToggle      = document.getElementById('btnToggleMode');
  const btnSubmit      = document.getElementById('btnSubmit');
  const btnLabel       = document.getElementById('btnLabel');
  const cardTitle      = document.getElementById('cardTitle');
  const cardSub        = document.getElementById('cardSub');
  const confirmGroup   = document.getElementById('fPassConfirmGroup');
  const errorMsg       = document.getElementById('errorMsg');
  const successMsg     = document.getElementById('successMsg');

  btnToggle.addEventListener('click', () => {
    isSignUp = !isSignUp;
    cardTitle.textContent    = isSignUp ? 'Criar conta' : 'Bem-vindo de volta';
    cardSub.textContent      = isSignUp ? 'Preencha os dados para criar seu acesso' : 'Entre com seu e-mail e senha para continuar';
    btnLabel.textContent     = isSignUp ? 'Criar conta' : 'Entrar';
    btnToggle.textContent    = isSignUp ? 'Já tenho conta — Entrar' : 'Primeiro acesso? Criar conta';
    confirmGroup.style.display = isSignUp ? 'block' : 'none';
    clearMsgs();
  });

  function setLoading(on) {
    btnSubmit.disabled = on;
    btnSubmit.classList.toggle('loading', on);
  }

  function showError(msg) {
    errorMsg.textContent = msg;
    errorMsg.classList.add('visible');
    successMsg.classList.remove('visible');
  }

  function showSuccess(msg) {
    successMsg.textContent = msg;
    successMsg.classList.add('visible');
    errorMsg.classList.remove('visible');
  }

  function clearMsgs() {
    errorMsg.classList.remove('visible');
    successMsg.classList.remove('visible');
  }

  ['fEmail','fPass','fPassConfirm'].forEach(id => {
    document.getElementById(id)?.addEventListener('input', clearMsgs);
  });

  document.getElementById('loginForm').addEventListener('submit', async (e) => {
    e.preventDefault();
    const email = document.getElementById('fEmail').value.trim();
    const pass  = document.getElementById('fPass').value;

    if (!email || !pass) return showError('Preencha e-mail e senha.');

    setLoading(true);

    if (isSignUp) {
      const confirm = document.getElementById('fPassConfirm').value;
      if (pass !== confirm) { setLoading(false); return showError('As senhas não coincidem.'); }
      if (pass.length < 6)  { setLoading(false); return showError('Senha deve ter ao menos 6 caracteres.'); }

      const { error } = await sb.auth.signUp({ email, password: pass });
      setLoading(false);
      if (error) return showError(error.message);
      showSuccess('Conta criada! Verifique seu e-mail para confirmar o acesso.');

    } else {
      const { data, error } = await sb.auth.signInWithPassword({ email, password: pass });
      setLoading(false);
      if (error) return showError('E-mail ou senha incorretos.');

      // Sessão válida — marca auth e redireciona
      sessionStorage.setItem('ff_auth', '1');
      sessionStorage.setItem('ff_user_email', email);

      // Se há dados locais e é o primeiro login na nuvem, fará push automático via store
      window.location.replace('index.html');
    }
  });
</script>

</body>
</html>
